name: GuDesk Release

on:
  push:
    tags:
      - 'gudesk-v[0-9]+.[0-9]+.[0-9]+'

env:
  # Bumped from 3.24.5 — the GuDesk redesign work uses Flutter 3.27+ theming
  # APIs (DialogThemeData/TabBarThemeData) plus extended_text 15.0.2 and
  # google_fonts ^8.1.0, all verified built/running against 3.44.4 locally
  # this session (many successful `flutter build macos --release` runs).
  FLUTTER_VERSION: '3.44.4'
  RUST_TOOLCHAIN: stable
  # Same pinned commit as .github/workflows/flutter-build.yml (the proven,
  # working upstream workflow) — this custom release workflow never actually
  # had vcpkg set up at all (cargo build failed with "Couldn't find
  # VCPKG_ROOT" / homebrew-fallback opus not found on every platform, since
  # it had apparently never been run successfully before).
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"

jobs:
  # ── flutter_rust_bridge codegen (bridge_generated.*) ───────────────────────
  # This custom release workflow never generated the bridge at all, unlike
  # the official .github/workflows/bridge.yml (which flutter-build.yml
  # depends on). Every platform build failed at "Build Rust core" with
  # `error[E0583]: file not found for module 'bridge_generated'`. This job
  # ports the proven pattern from bridge.yml, simplified to a single Flutter
  # 3.44 variant (no matrix) since gudesk-release.yml now targets 3.44.4
  # uniformly and the Flutter-3.44 source patches are already permanently
  # committed in this repo.
  generate-bridge:
    name: Generate bridge
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl gcc git g++ libclang-dev libgtk-3-dev llvm-dev nasm ninja-build pkg-config wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache flutter_rust_bridge_codegen
        uses: actions/cache@v4
        with:
          path: /tmp/flutter_rust_bridge
          key: ${{ runner.os }}-frb-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-${{ env.CARGO_EXPAND_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install cargo-expand
        run: cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked

      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: Generate bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Copy bridge header for iOS
        run: cp flutter/macos/Runner/bridge_generated.h flutter/ios/Runner/bridge_generated.h

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            src/bridge_generated.rs
            src/bridge_generated.io.rs
            flutter/lib/generated_bridge.dart
            flutter/lib/generated_bridge.freezed.dart
            flutter/macos/Runner/bridge_generated.h
            flutter/ios/Runner/bridge_generated.h
          retention-days: 1

  # ── macOS (aarch64) ────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS aarch64
    needs: [generate-bridge]
    runs-on: macos-14           # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gudesk-v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install nasm
        run: brew install nasm

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet arm64-osx --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Rust core
        run: cargo build --release --features flutter

      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: Build Flutter macOS
        working-directory: flutter
        # cargo builds a single-arch (arm64) dylib for this runner; Xcode's
        # default ARCHS_STANDARD is universal (arm64+x86_64), so without
        # pinning ARCHS the linker looks for an x86_64 slice that doesn't
        # exist ("Undefined symbols for architecture x86_64"). Same fix
        # build.py already applies locally (see build.py:414-419).
        env:
          FLUTTER_XCODE_ARCHS: arm64
          FLUTTER_XCODE_ONLY_ACTIVE_ARCH: "YES"
        run: flutter build macos --release

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: aarch64
        run: bash gudesk/build/macos/build_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-dmg
          path: target/GuDesk-*.dmg
          retention-days: 1

  # ── macOS (x86_64) ────────────────────────────────────────────────────────
  build-macos-x64:
    name: macOS x86_64
    needs: [generate-bridge]
    runs-on: macos-13           # Intel runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gudesk-v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install nasm
        run: brew install nasm

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-osx --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Rust core
        run: cargo build --release --features flutter

      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: Build Flutter macOS
        working-directory: flutter
        # See matching comment in build-macos-arm: pin ARCHS to this
        # runner's single-arch (x86_64) Rust dylib.
        env:
          FLUTTER_XCODE_ARCHS: x86_64
          FLUTTER_XCODE_ONLY_ACTIVE_ARCH: "YES"
        run: flutter build macos --release

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: x86_64
        run: bash gudesk/build/macos/build_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-dmg
          path: target/GuDesk-*.dmg
          retention-days: 1

  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#gudesk-v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM / nasm
        run: choco install llvm nasm -y

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Rust core
        run: cargo build --release --features flutter

      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: Build Flutter Windows
        working-directory: flutter
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: cmd
        run: |
          iscc /DAppVersion=${{ steps.version.outputs.version }} ^
               gudesk\build\windows\installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-installer
          path: target\GuDesk-Setup-*.exe
          retention-days: 1

  # ── Release & manifest ────────────────────────────────────────────────────
  publish:
    name: Create GitHub Release
    needs: [build-macos-arm, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gudesk-v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate manifest
        run: |
          python3 gudesk/build/generate_manifest.py \
            --version "${{ steps.version.outputs.version }}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            --macos-aarch64  release-artifacts/macos-aarch64-dmg/GuDesk-${{ steps.version.outputs.version }}-aarch64.dmg \
            --macos-x86_64   release-artifacts/macos-x86_64-dmg/GuDesk-${{ steps.version.outputs.version }}-x86_64.dmg \
            --windows-x86_64 release-artifacts/windows-x86_64-installer/GuDesk-Setup-${{ steps.version.outputs.version }}-x86_64.exe \
            --output release-artifacts/manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GuDesk ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/macos-aarch64-dmg/*.dmg
            release-artifacts/macos-x86_64-dmg/*.dmg
            release-artifacts/windows-x86_64-installer/*.exe
            release-artifacts/manifest.json
