pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // Bumped 7.3.1 -> 8.11.1 to match flutter_tools/gradle's own
    // compileOnly("com.android.tools.build:gradle:8.11.1") dependency.
    // AGP 8.11.1 requires Gradle 8.13+ (see gradle-wrapper.properties).
    id "com.android.application" version "8.11.1" apply false
    // Reverted my earlier (incorrect) downgrade to 1.9.24. The real cause of
    // the "Language version 1.4 is no longer supported" / :gradle:compileKotlin
    // failure was the Gradle wrapper being stuck on 7.6.4 -- its old kotlin-dsl
    // integration targets language version 1.4 by default, incompatible with
    // the Kotlin 2.2.20 compiler flutter_tools/gradle uses for itself. Now that
    // Gradle is bumped to 8.13, this app's own Kotlin plugin version doesn't
    // need to change; restored to its original pre-session value.
    id "org.jetbrains.kotlin.android" version "2.1.21" apply false
}

include ":app"
